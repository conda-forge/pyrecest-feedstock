context:
  name: pyrecest
  version: "2.2.4"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/FlorianPfaff/pyrecest/archive/refs/tags/${{ version }}.tar.gz
  sha256: 80ccb6dbef01bfb74cf6b4d92299134ac69914c1db8f951e1cc29d8258ceb2f8

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core
  run:
    - python >=${{ python_min }}
    - numpy
    - scipy >=1.16.3
    - matplotlib-base
    - mpmath
    - bayesian-filters
    - pyshtools
    - beartype
    - shapely

tests:
  - python:
      imports:
        - pyrecest
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/FlorianPfaff/pyRecEst
  summary: 'Framework for recursive Bayesian estimation in Python.'
  description: |
    pyRecEst is a Python library tailored for recursive Bayesian estimation, compatible with numpy, pytorch, and jax backends.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - claudiushaag
