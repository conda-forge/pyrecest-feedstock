context:
  name: pyrecest
  version: "2.2.3"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/FlorianPfaff/pyrecest/archive/refs/tags/${{ version }}.tar.gz
  sha256: b770683e8aaa5cc9883b140424d37dd94dfffb94f98957a1d12e42120191ee28

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core >=2.0.0, <3.0.0
  run:
    - python >=${{ python_min }}
    - numpy >=2.0, <2.5
    - scipy >=1.14, <1.18
    - matplotlib-base >=3.8, <4.0
    - mpmath >=1.3, <1.4
    - pyshtools >=4.12,<5.0
    - beartype >=0.18,<0.23
    - shapely >=2.0,<3.0

tests:
  - python:
      imports:
        - pyrecest
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/FlorianPfaff/pyRecEst
  summary: 'Framework for recursive Bayesian estimation in Python.'
  description: |
    pyRecEst is a Python library tailored for recursive Bayesian estimation, compatible with numpy, pytorch, and jax backends.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - claudiushaag
